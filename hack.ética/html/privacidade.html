<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">

<style>
   /* =========================
   PRIVACIDADE
========================= */

.privacidade{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

/* HERO */

.hero-privacidade{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:40px;

    padding:50px;
    margin-bottom:50px;

    border-radius:25px;

    background:linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
    );

    color:#fff;
}

.hero-texto h1{
    font-size:3rem;
    margin-bottom:15px;
}

.hero-texto p{
    max-width:600px;
    line-height:1.8;
}

.hero-icon{
    font-size:6rem;
    opacity:.9;
}

/* CARDS */

.cards-info{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;

    margin-bottom:60px;
}

.info-card{
    background:#fff;

    padding:30px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.3s;
}

.info-card:hover{
    transform:translateY(-8px);
}

.info-card i{
    font-size:2rem;
    color:#2563eb;
    margin-bottom:15px;
}

.info-card h3{
    margin-bottom:10px;
}

/* LGPD */

.conteudo-lgpd{
    background:#fff;
    padding:40px;
    border-radius:25px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    margin-bottom:50px;
}

.conteudo-lgpd h2{
    color:#2563eb;
    margin-bottom:20px;
}

.conteudo-lgpd p{
    margin-bottom:20px;
    line-height:1.8;
}

.conteudo-lgpd ul{
    list-style:none;
}

.conteudo-lgpd li{
    margin:12px 0;
    font-weight:500;
}

/* DICAS */

.dicas-seguranca h2{
    text-align:center;
    color:#2563eb;
    margin-bottom:30px;
}

.dicas-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.dica{
    background:#fff;
    padding:30px;
    text-align:center;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.3s;
}

.dica:hover{
    transform:translateY(-8px);
}

.dica i{
    font-size:2.5rem;
    color:#2563eb;
    margin-bottom:15px;
}

.dica h4{
    margin-bottom:10px;
}

/* RESPONSIVO */

@media(max-width:768px){

    .hero-privacidade{
        flex-direction:column;
        text-align:center;
    }

    .hero-texto h1{
        font-size:2.2rem;
    }

    .hero-icon{
        font-size:4rem;
    }

}
</style>

</head>
<body>

<!-- ===== MENU (injetado pelo app.js) ===== -->
<div id="app-menu"></div>
<script src="js/app.js"></script>
